<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linktree | Loading...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --accent-color: #ffffff;
            --button-color: rgba(255, 255, 255, 0.1);
            --button-hover: rgba(255, 255, 255, 0.2);
            --glass-blur: 15px;
            --border-radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html {
            background-color: #2a5298;
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            width: 100%;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--accent-color);
            padding: 1rem;
            background-color: #2a5298;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-gradient);
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            transition: background 0.5s ease;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
            padding-bottom: 2rem;
        }

        .profile {
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease-out;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            position: sticky;
            top: 1rem;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .profile.has-bg {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #ffffff;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.8);
            border: none;
        }

        .profile.has-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
            pointer-events: none;
        }

        .profile-img,
        .profile-name,
        .profile-bio {
            position: relative;
            z-index: 1;
        }

        .profile::before {
            content: '';
            position: absolute;
            top: -100%;
            left: -100%;
            width: 200%;
            height: 200%;
            background: linear-gradient(135deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.05) 50%,
                    rgba(255, 255, 255, 0) 100%);
            transform: rotate(45deg);
            animation: profileShine 10s infinite linear;
            pointer-events: none;
        }

        @keyframes profileShine {
            0% { transform: translate(-50%, -50%) rotate(45deg); }
            100% { transform: translate(50%, 50%) rotate(45deg); }
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            object-fit: cover;
            margin-bottom: 1rem;
            transition: transform 0.3s ease;
        }

        .profile-img:hover { transform: scale(1.05); }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .profile-bio {
            font-size: 1rem;
            opacity: 0.8;
            max-width: 80%;
            margin: 0 auto;
        }

        .links {
            display: grid;
            gap: 1rem;
            padding: 1rem 0;
        }

        .link-card {
            position: relative;
            padding: 1rem 1.5rem;
            background: var(--button-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            text-decoration: none;
            color: var(--accent-color);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }

        .link-card:hover {
            background: var(--button-hover);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .link-icon {
            font-size: 1.25rem;
            width: 24px;
            text-align: center;
        }

        .link-label {
            flex-grow: 1;
            text-align: center;
            font-size: 1.1rem;
        }

        .dropdown-arrow {
            font-size: 0.8rem;
            transition: transform 0.3s ease;
        }

        .is-open .dropdown-arrow { transform: rotate(90deg); }

        .submenu {
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            width: 90%;
            margin: 0 auto;
            opacity: 0;
        }

        .is-open + .submenu {
            max-height: 1000px;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
            opacity: 1;
        }

        .sublink-card {
            padding: 0.75rem 1.25rem;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.05);
        }

        .sublink-card:hover { background: rgba(255, 255, 255, 0.15); }

        .shiny { position: relative; }

        .shiny::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.3) 50%,
                    rgba(255, 255, 255, 0) 100%);
            transform: skewX(-25deg);
            transition: none;
            pointer-events: none;
        }

        .shiny-active::before { animation: shine 3s infinite linear; }

        @keyframes shine {
            from { left: -150%; }
            to { left: 150%; }
        }

        footer {
            margin-top: auto;
            padding: 2rem 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .social-icons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            align-items: center;
            margin-bottom: 1rem;
        }

        .social-icon-link {
            color: var(--accent-color);
            font-size: 1.8rem;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.3s ease;
        }

        .social-icon-link:hover {
            transform: scale(1.2) translateY(-3px);
            color: #ddd;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            body { padding: 0; }
            .container { max-width: 100%; padding: 0; }
            .profile {
                margin-bottom: 1.5rem;
                padding: 1.5rem 1rem;
                top: 0;
                border-radius: 0 0 var(--border-radius) var(--border-radius);
                border-top: none;
                border-left: none;
                border-right: none;
            }
            .profile-img { width: 80px; height: 80px; }
            .profile-name { font-size: 1.25rem; }
            .profile-bio { font-size: 0.9rem; max-width: 90%; }
            .links { padding: 0 1rem 2rem 1rem; gap: 0.75rem; }
            .link-card { padding: 0.85rem 1.25rem; }
            .submenu { width: 100%; }
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

    <div id="loading">
        <div class="spinner"></div>
    </div>

    <div class="container" id="app" style="display: none;">
        <header class="profile">
            <img id="profile-img" src="" alt="Profile" class="profile-img">
            <h1 id="profile-name" class="profile-name"></h1>
            <p id="profile-bio" class="profile-bio"></p>
        </header>

        <main class="links" id="links-container"></main>

        <footer>
            <div class="social-icons" id="social-container"></div>
            <div style="font-size: 0.8rem; opacity: 0.6; margin-top: 1rem;">
                Powered by GitHub Pages
            </div>
        </footer>
    </div>

    <script>
        // Ganti URL ini dengan Web App URL dari Apps Script kamu
        // Cara dapat URL: Apps Script > Deploy > New Deployment > Web App > Copy URL
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwnhjcqlbEhkQdfznsrcFA_mROKacnwhVdmdaECPB2EW7VUO8UYXxYgtDj3WnpHkI3pYQ/exec";

        document.addEventListener('DOMContentLoaded', function () {
            fetch(APPS_SCRIPT_URL)
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        console.error(data.error);
                        alert('Error dari Spreadsheet: ' + data.error);
                        return;
                    }
                    renderPage(data);
                    hideLoading();
                })
                .catch(err => {
                    console.error('Failed to fetch data:', err);
                    alert('Gagal mengambil data. Pastikan APPS_SCRIPT_URL sudah diisi dengan benar.');
                });
        });

        function renderPage(data) {
            const s = data.settings;
            const l = data.links;

            document.title = s.title || 'Linktree';

            document.getElementById('profile-img').src = s.profile_img || 'https://via.placeholder.com/150';
            document.getElementById('profile-name').textContent = s.profile_name || 'Your Name';
            document.getElementById('profile-bio').textContent = s.bio || '';

            if (s.bg_gradient) document.documentElement.style.setProperty('--bg-gradient', s.bg_gradient);
            if (s.accent_color) document.documentElement.style.setProperty('--accent-color', s.accent_color);
            if (s.button_color) document.documentElement.style.setProperty('--button-color', s.button_color);

            if (s.header_img) {
                const profileHeader = document.querySelector('.profile');
                profileHeader.style.backgroundImage = `url('${s.header_img}')`;
                profileHeader.classList.add('has-bg');
            }

            const container = document.getElementById('links-container');
            container.innerHTML = '';
            l.forEach((link, index) => {
                container.appendChild(createLinkElement(link, index));
            });

            const socialContainer = document.getElementById('social-container');
            socialContainer.innerHTML = '';
            const socials = [
                { icon: 'fab fa-youtube', url: s.social_youtube },
                { icon: 'fab fa-tiktok', url: s.social_tiktok },
                { icon: 'fab fa-instagram', url: s.social_instagram }
            ];
            socials.forEach(social => {
                if (social.url) {
                    const a = document.createElement('a');
                    a.href = social.url;
                    a.target = '_blank';
                    a.className = 'social-icon-link';
                    a.innerHTML = `<i class="${social.icon}"></i>`;
                    socialContainer.appendChild(a);
                }
            });
        }

        function createLinkElement(link, index, isSub = false) {
            const wrapper = document.createElement('div');
            wrapper.className = 'link-wrapper';

            const a = document.createElement(link.url ? 'a' : 'div');
            if (link.url) {
                a.href = link.url;
                a.target = '_blank';
            }

            a.className = `link-card ${isSub ? 'sublink-card' : ''}`;
            if (link.animate) a.classList.add('shiny', 'shiny-active');
            a.style.animationDelay = (index * 0.1) + 's';
            a.style.cursor = 'pointer';

            const hasChildren = link.children && link.children.length > 0;
            a.innerHTML = `
                <i class="link-icon ${link.icon}"></i>
                <span class="link-label">${link.label}</span>
                ${hasChildren ? '<i class="fas fa-chevron-right dropdown-arrow"></i>' : (link.url ? '<i class="fas fa-external-link-alt" style="font-size: 0.7rem; opacity: 0.3;"></i>' : '')}
            `;

            wrapper.appendChild(a);

            if (hasChildren) {
                const submenu = document.createElement('div');
                submenu.className = 'submenu';
                link.children.forEach((child, cIndex) => {
                    submenu.appendChild(createLinkElement(child, cIndex, true));
                });
                wrapper.appendChild(submenu);

                a.addEventListener('click', function (e) {
                    if (!link.url) {
                        e.preventDefault();
                        a.classList.toggle('is-open');
                    }
                });
            }

            return wrapper;
        }

        function hideLoading() {
            const loading = document.getElementById('loading');
            const app = document.getElementById('app');
            loading.style.opacity = '0';
            setTimeout(() => {
                loading.style.display = 'none';
                app.style.display = 'block';
            }, 500);
        }
    </script>
</body>

</html>
